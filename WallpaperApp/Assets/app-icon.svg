<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8A4C"/>
      <stop offset="0.45" stop-color="#D14A78"/>
      <stop offset="1" stop-color="#3F1F7A"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFEFC2" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#FFD487" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FFD487" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A2A78"/>
      <stop offset="1" stop-color="#341753"/>
    </linearGradient>
    <linearGradient id="mountainFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22103A"/>
      <stop offset="1" stop-color="#0E0721"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="8" y="8" width="240" height="240" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <!-- Background frame with sunset gradient -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44" fill="url(#bg)"/>

  <g clip-path="url(#frame)">
    <!-- Sun halo -->
    <circle cx="180" cy="92" r="58" fill="url(#halo)"/>
    <!-- Sun -->
    <circle cx="180" cy="92" r="24" fill="#FFEFC2"/>

    <!-- Back mountain range -->
    <path d="M 8 210 L 50 155 L 92 185 L 138 130 L 188 170 L 230 145 L 248 165 L 248 248 L 8 248 Z"
          fill="url(#mountainBack)"/>

    <!-- Front mountain range (overlapping) -->
    <path d="M 8 248 L 8 220 L 48 188 L 96 222 L 148 178 L 196 218 L 248 192 L 248 248 Z"
          fill="url(#mountainFront)"/>
  </g>

  <!-- Inner frame border (suggests photo / wallpaper frame) -->
  <rect x="14" y="14" width="228" height="228" rx="38" ry="38"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
